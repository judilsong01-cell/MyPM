<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="ibg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
  </defs>

  <!-- Outer shape -->
  <rect width="512" height="512" rx="120" fill="url(#ibg)"/>

  <!-- Blue glow halo behind bars -->
  <ellipse cx="256" cy="380" rx="200" ry="40" fill="#2563EB" opacity="0.08"/>

  <!-- 3 rising bars -->
  <rect x="96" y="276" width="86" height="186" rx="18" fill="#60A5FA" opacity="0.55"/>
  <rect x="210" y="196" width="86" height="266" rx="18" fill="#3B82F6" opacity="0.8"/>
  <rect x="324" y="112" width="86" height="350" rx="18" fill="#2563EB"/>

  <!-- Floor -->
  <line x1="80" y1="464" x2="432" y2="464" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.12"/>

  <!-- Trend line + arrow -->
  <polyline points="139,268 253,188 367,104" stroke="#4ADE80" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="367" cy="104" r="18" fill="#4ADE80"/>
  <circle cx="367" cy="104" r="32" fill="#4ADE80" opacity="0.2"/>
</svg>