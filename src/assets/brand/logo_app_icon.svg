<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#93C5FD"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12" result="blur"/>
      <feFlood flood-color="#2563EB" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="512" x2="1024" y2="512" stroke="white" stroke-width="1" opacity="0.03"/>
  <line x1="512" y1="0" x2="512" y2="1024" stroke="white" stroke-width="1" opacity="0.03"/>

  <!-- Bar chart — 3 rising bars centered -->
  <!-- Bar 1 (left, shortest) -->
  <rect x="248" y="540" width="110" height="240" rx="22" fill="url(#bar3)" filter="url(#glow)"/>
  <!-- Bar 2 (mid) -->
  <rect x="390" y="420" width="110" height="360" rx="22" fill="url(#bar2)" filter="url(#glow)"/>
  <!-- Bar 3 (right, tallest) -->
  <rect x="532" y="288" width="110" height="492" rx="22" fill="url(#bar1)" filter="url(#glow)"/>

  <!-- Trend arrow line over bars -->
  <polyline points="303,530 445,408 587,276" stroke="#4ADE80" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9"/>
  <!-- Arrow head -->
  <polygon points="587,276 632,318 544,308" fill="#4ADE80" opacity="0.9"/>

  <!-- "m" letterform subtle in top-left — decorative -->
  <text x="108" y="290" font-family="Georgia, serif" font-size="130" font-weight="700" fill="white" opacity="0.06" letter-spacing="-4">my</text>

  <!-- Bottom floor line -->
  <line x1="200" y1="782" x2="720" y2="782" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.15"/>

  <!-- "PME" wordmark at bottom -->
  <text x="512" y="920" text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="96" font-weight="900"
        fill="white" letter-spacing="12" opacity="0.9">PME</text>
  <text x="200" y="920"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="72" font-weight="300"
        fill="#60A5FA" letter-spacing="2" opacity="0.85">my</text>
</svg>