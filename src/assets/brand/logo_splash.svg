<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920" fill="none">
  <defs>
    <radialGradient id="splashbg" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1920" fill="url(#splashbg)"/>

  <!-- Subtle concentric circles -->
  <circle cx="540" cy="780" r="400" stroke="#2563EB" stroke-width="1" opacity="0.06" fill="none"/>
  <circle cx="540" cy="780" r="520" stroke="#2563EB" stroke-width="1" opacity="0.04" fill="none"/>
  <circle cx="540" cy="780" r="640" stroke="#2563EB" stroke-width="1" opacity="0.03" fill="none"/>

  <!-- App icon centered -->
  <rect x="390" y="580" width="300" height="300" rx="70" fill="#1E293B" stroke="#2563EB" stroke-width="3" opacity="0.9"/>

  <!-- Bars inside icon -->
  <rect x="420" y="756" width="52" height="94" rx="12" fill="#60A5FA" opacity="0.55"/>
  <rect x="490" y="706" width="52" height="144" rx="12" fill="#3B82F6" opacity="0.8"/>
  <rect x="560" y="650" width="52" height="200" rx="12" fill="#2563EB"/>

  <!-- Trend line inside icon -->
  <polyline points="446,750 516,700 586,644" stroke="#4ADE80" stroke-width="10" stroke-linecap="round" fill="none"/>
  <circle cx="586" cy="644" r="10" fill="#4ADE80"/>

  <!-- Wordmark below icon -->
  <text x="540" y="970"
        text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="0" fill="white">
    <tspan font-size="100" font-weight="300" fill="#60A5FA" letter-spacing="-2">my</tspan><tspan font-size="100" font-weight="900" fill="white" letter-spacing="8">PME</tspan>
  </text>

  <!-- Manual layout: "my" left of center, "PME" right -->
  <text x="390" y="980"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="100" font-weight="300"
        fill="#60A5FA" letter-spacing="-2">my</text>
  <text x="532" y="980"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="100" font-weight="900"
        fill="white" letter-spacing="8">PME</text>

  <!-- Tagline -->
  <text x="540" y="1044"
        text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="24" font-weight="400"
        fill="#475569" letter-spacing="5">GESTÃO SIMPLES. CRESCIMENTO REAL.</text>

  <!-- Version / build -->
  <text x="540" y="1860"
        text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="22" fill="#1E293B">versão 1.0 · Angola 🇦🇴</text>
</svg>