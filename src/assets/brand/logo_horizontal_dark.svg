<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200" fill="none">
  <defs>
    <linearGradient id="iconbg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="24" fill="#0F172A"/>

  <!-- Icon box -->
  <rect x="20" y="24" width="152" height="152" rx="32" fill="url(#iconbg)" stroke="#2563EB" stroke-width="2" opacity="0.8"/>

  <!-- Mini bar chart inside icon -->
  <rect x="44" y="112" width="26" height="44" rx="6" fill="#60A5FA" opacity="0.5"/>
  <rect x="79" y="88" width="26" height="68" rx="6" fill="#3B82F6" opacity="0.75"/>
  <rect x="114" y="60" width="26" height="96" rx="6" fill="#2563EB"/>

  <!-- Trend line inside icon -->
  <polyline points="57,110 92,86 127,58" stroke="#4ADE80" stroke-width="7" stroke-linecap="round" fill="none"/>
  <circle cx="127" cy="58" r="6" fill="#4ADE80"/>

  <!-- Wordmark: "my" light + "PME" bold -->
  <text x="200" y="122"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="80" font-weight="300"
        fill="#60A5FA" letter-spacing="-1">my</text>
  <text x="330" y="122"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="80" font-weight="900"
        fill="white" letter-spacing="3">PME</text>

  <!-- Tagline -->
  <text x="200" y="152"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="18" font-weight="400"
        fill="#475569" letter-spacing="3">GESTÃO SIMPLES. CRESCIMENTO REAL.</text>
</svg>