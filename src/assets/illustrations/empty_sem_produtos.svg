<svg xmlns="http://www.w3.org/2000/svg" width="480" height="360" viewBox="0 0 480 360" fill="none">

  <!-- Shelf -->
  <rect x="60" y="280" width="360" height="20" rx="6" fill="#1E293B" stroke="#64748B" stroke-width="2"/>
  <rect x="80" y="120" width="12" height="160" rx="4" fill="#1E293B" stroke="#64748B" stroke-width="2"/>
  <rect x="388" y="120" width="12" height="160" rx="4" fill="#1E293B" stroke="#64748B" stroke-width="2"/>
  <!-- Empty box outlines on shelf -->
  <rect x="110" y="200" width="70" height="80" rx="10" fill="#0F172A" stroke="#64748B" stroke-width="2" stroke-dasharray="8 5"/>
  <rect x="205" y="190" width="70" height="90" rx="10" fill="#0F172A" stroke="#64748B" stroke-width="2" stroke-dasharray="8 5"/>
  <rect x="300" y="205" width="70" height="75" rx="10" fill="#0F172A" stroke="#64748B" stroke-width="2" stroke-dasharray="8 5"/>
  <!-- Big central empty box -->
  <polygon points="240,80 330,128 330,224 240,272 150,224 150,128" fill="#0F172A" stroke="#64748B" stroke-width="3" stroke-linejoin="round" stroke-dasharray="10 6"/>
  <polygon points="240,80 330,128 240,176 150,128" fill="#1E293B" opacity="0.4" stroke="#64748B" stroke-width="3" stroke-dasharray="10 6"/>
  <!-- Question mark inside -->
  <text x="240" y="200" text-anchor="middle" font-family="sans-serif" font-size="52" font-weight="700" fill="#64748B" opacity="0.5">?</text>

</svg>